name: "Publish MCP Servers"

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish-mcp-sparql:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: extract_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=1.0.0" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Publish MCP SPARQL to MCP Registry
        uses: OtherVibes/mcp-publish-action@v1
        with:
          name: io.github.comunica/mcp-sparql
          description: "An MCP server for executing SPARQL queries over decentralized RDF knowledge graphs on the Web"
          version: ${{ steps.extract_version.outputs.version }}
          registry_type: npm
          identifier: "@comunica/mcp-sparql"
          transport_type: stdio
          website_url: https://comunica.dev/

  publish-mcp-sparql-file:
