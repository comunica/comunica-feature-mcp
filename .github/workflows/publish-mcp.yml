name: "Publish MCP Servers"

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish-mcp-servers:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    strategy:
      matrix:
        server:
          - name: mcp-sparql
            npm_package: "@comunica/mcp-sparql"
            description: >-
              An MCP server for executing SPARQL queries over
              decentralized RDF knowledge graphs on the Web
          - name: mcp-sparql-file
            npm_package: "@comunica/mcp-sparql-file"
            description: >-
              An MCP server for executing SPARQL queries over
              local and remote RDF files
          - name: mcp-sparql-hdt
            npm_package: "@comunica/mcp-sparql-hdt"
            description: >-
              An MCP server for executing SPARQL queries
              over HDT files
          - name: mcp-sparql-solid
            npm_package: "@comunica/mcp-sparql-solid"
            description: >-
              An MCP server for executing SPARQL queries over
              Solid data pods with authentication support
          - name: mcp-sparql-link-traversal
            npm_package: "@comunica/mcp-sparql-link-traversal"
            description: >-
              An MCP server for executing SPARQL queries with
              link traversal capabilities
          - name: mcp-sparql-link-traversal-solid
            npm_package: "@comunica/mcp-sparql-link-traversal-solid"
            description: >-
              An MCP server for executing SPARQL queries with
              link traversal over Solid data pods with
              authentication support

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag or lerna.json
        id: extract_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=$(jq -r '.version' lerna.json)" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Publish ${{ matrix.server.name }} to MCP Registry
        uses: OtherVibes/mcp-publish-action@6a14dde3f1a2093b72f437ba93205a320ae60952
        with:
          name: io.github.comunica/${{ matrix.server.name }}
          description: ${{ matrix.server.description }}
          version: ${{ steps.extract_version.outputs.version }}
          registry_type: npm
          identifier: ${{ matrix.server.npm_package }}
          transport_type: stdio
          website_url: https://comunica.dev/
